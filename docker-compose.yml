services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: superexport_test
      MYSQL_USER: superexport
      MYSQL_PASSWORD: superexport
    ports:
      - "3307:3306"
    volumes:
      - ./tests/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usuperexport", "-psuperexport"]
      interval: 5s
      timeout: 5s
      retries: 10
